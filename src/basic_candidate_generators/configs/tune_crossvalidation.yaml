# Cross-validation hyperparameter tuning config.
# One Optuna study per model. Each trial = 5 folds.
# Run: uv run python launchers_crossvalidation/tune_crossvalidation.py --model <model_name>

data:
  splitk_dir: data/splitK
  track_metadata_path: data/talkpl-ai/TalkPlayData-Challenge-Track-Metadata/data/all_tracks-00000-of-00001.parquet
  n_folds: 5

evaluation:
  top_k: 700
  remove_seen: true
  primary_metric: recall@200
  recall_ks: [20, 100, 150, 200, 300, 400, 500, 600, 700]
  ndcg_ks:   [20, 100, 200, 300, 400, 500, 600, 700]

pruning:
  n_startup_trials: 5   # don't prune first 5 trials
  n_warmup_steps: 1     # start reporting after fold 1 (prune after fold 2+)

# ---------------------------------------------------------------------------
# Per-model configs
# ---------------------------------------------------------------------------
# Each model entry:
#   class:          Python class name
#   module:         dotted module path (relative to src/)
#   inference_mode: "standard" (default) or "text" (TextCGRecommender subclasses)
#   n_trials:       total Optuna trials (including any already completed)
#   n_jobs:         parallel Optuna workers (set 1 for GPU models)
#   urm_mode:       "session" or "user"
#   fixed_params:   params passed to the recommender but NOT tuned
#   search_space:   tunable params with Optuna spec
#     type:          int | float (required when YAML parses low/high as float)
#     low, high:     search bounds
#     log:           true for log-scale (optional)
#     step:          discrete step (optional)
#     choices:       categorical list (mutually exclusive with low/high)
#     conditional_on: {other_param: value} — only pass to rec when condition met

models:

  item_knn:
    class: ItemKNNRecommender
    module: recommenders.item_knn
    n_trials: 300
    n_jobs: 2
    urm_modes: [session, user]
    fixed_params: {}
    search_space:
      k:          {low: 10,   high: 800,  log: true,  type: int}
      shrink:     {low: 0.0,  high: 1000.0,           type: float}
      icm_weight: {low: 0.0,  high: 1.0,              type: float}
      k_icm:      {low: 10,   high: 500,  log: true,  type: int}

  rp3beta:
    class: RP3BetaRecommender
    module: recommenders.rp3beta
    n_trials: 300
    n_jobs: 2
    urm_modes: [session, user]
    fixed_params: {}
    search_space:
      top_k:      {low: 10,  high: 500,  step: 2,   type: int}
      alpha:      {low: 0.1, high: 2.0,             type: float}
      beta:       {low: 0.0, high: 1.0,             type: float}
      icm_weight: {low: 0.0, high: 1.0,             type: float}
      k_icm:      {low: 10,  high: 500,  log: true, type: int}

  slim_bpr:
    class: SLIMBPRRecommender
    module: recommenders.slim_bpr
    n_trials: 200
    n_jobs: 1
    urm_modes: [session, user]
    fixed_params:
      workers: 8
    search_space:
      top_k:         {low: 10,    high: 500,  step: 10,  type: int}
      epochs:        {low: 10,    high: 300,  step: 10,  type: int}
      learning_rate: {low: 0.001, high: 0.5,  log: true, type: float}
      reg_pos:       {low: 1.0e-5, high: 0.1, log: true, type: float}
      reg_neg:       {low: 1.0e-5, high: 0.1, log: true, type: float}
      icm_weight:    {low: 0.0,   high: 1.0,            type: float}
      k_icm:         {low: 10,    high: 500,  log: true, type: int}

  slim_elasticnet:
    class: SLIMElasticNetRecommender
    module: recommenders.slim_elasticnet
    n_trials: 200
    n_jobs: 1
    urm_modes: [session, user]
    fixed_params:
      workers: 15
    search_space:
      top_k:      {low: 10,     high: 1000, step: 5,   type: int}
      alpha:      {low: 1.0e-5, high: 1.0,  log: true, type: float}
      l1_ratio:   {low: 0.0,    high: 1.0,             type: float}
      max_iter:   {low: 50,     high: 500,  step: 10,  type: int}
      icm_weight: {low: 0.0,    high: 1.0,             type: float}
      k_icm:      {low: 10,     high: 500,  log: true, type: int}

  gf_cf:
    class: GFCFRecommender
    module: recommenders.gfcf
    n_trials: 200
    n_jobs: 1
    urm_modes: [session, user]
    fixed_params: {}
    search_space:
      K:           {low: 64,  high: 2048, step: 64,  type: int}
      filter_type: {choices: [linear, power]}
      alpha:       {low: 0.1, high: 5.0,  log: true, type: float}
      degree_exp:  {low: 0.0, high: 1.0,             type: float}
      beta:        {low: 0.5, high: 2.0,             type: float}

  session_knn:
    class: SessionKNNRecommender
    module: recommenders.session_knn
    n_trials: 200
    n_jobs: 4
    urm_modes: [session]
    fixed_params: {}
    search_space:
      k: {low: 10, high: 1000, log: true, type: int}

  sequential_rules:
    class: SequentialRulesRecommender
    module: recommenders.sequential_rules
    n_trials: 100
    n_jobs: 4
    urm_modes: [session]
    fixed_params: {}
    search_space:
      max_dist: {low: 1, high: 30, type: int}

  pure_svd:
    class: PureSVDRecommender
    module: recommenders.pure_svd
    n_trials: 100
    n_jobs: 4
    urm_modes: [session, user]
    fixed_params: {}
    search_space:
      n_factors: {low: 32, high: 512, log: true, type: int}

  prod2vec:
    class: Prod2VecRecommender
    module: recommenders.prod2vec
    n_trials: 150
    n_jobs: 4
    urm_modes: [session, user]
    fixed_params: {}
    search_space:
      n_factors: {low: 50,  high: 400, log: true, type: int}
      neg:       {low: 1,   high: 20,             type: int}

  ials:
    class: IALSRecommender
    module: recommenders.ials
    n_trials: 200
    n_jobs: 2
    urm_modes: [session, user]
    fixed_params: {}
    search_space:
      n_factors: {low: 32,  high: 256, log: true, type: int}
      reg:       {low: 0.1, high: 100, log: true, type: float}
      alpha:     {low: 5.0, high: 100.0,          type: float}
      iters:     {low: 5,   high: 20,             type: int}

  multvae:
    class: MultVAERecommender
    module: recommenders.multvae
    n_trials: 150
    n_jobs: 1
    urm_modes: [session, user]
    fixed_params:
      batch_size: 512
      total_anneal_steps: 200000
      weight_decay: 1.0e-5
    search_space:
      hidden_dim:    {low: 200,    high: 800,   step: 100,  type: int}
      latent_dim:    {low: 64,     high: 512,   step: 32,   type: int}
      dropout:       {low: 0.1,    high: 0.7,               type: float}
      beta:          {low: 0.05,   high: 0.5,   log: true,  type: float}
      learning_rate: {low: 1.0e-4, high: 5.0e-3, log: true, type: float}
      epochs:        {low: 20,     high: 150,   step: 10,   type: int}
      anneal_cap:    {low: 0.05,   high: 0.5,               type: float}
      use_icm:       {choices: [0, 1]}
      icm_weight:    {low: 0.1, high: 0.8, type: float, conditional_on: {use_icm: 1}}

  recvae:
    class: RecVAERecommender
    module: recommenders.recvae
    n_trials: 100
    n_jobs: 1
    urm_modes: [session, user]
    fixed_params:
      batch_size: 512
    search_space:
      hidden:    {low: 200,    high: 800,    step: 100,  type: int}
      latent:    {low: 64,     high: 512,    step: 32,   type: int}
      dropout:   {low: 0.1,    high: 0.7,               type: float}
      gamma:     {low: 1.0e-4, high: 0.1,   log: true,  type: float}
      lr:        {low: 1.0e-4, high: 5.0e-3, log: true, type: float}
      epochs:    {low: 20,     high: 100,    step: 10,   type: int}
      enc_steps: {choices: [1, 2, 3]}
      dec_steps: {choices: [1, 2]}

  tfidf_cg:
    class: TFIDFTextCG
    module: recommenders.text_cg
    inference_mode: text
    n_trials: 100
    n_jobs: 4
    urm_modes: [session]
    fixed_params: {}
    search_space:
      max_features: {low: 10000, high: 100000, step: 10000, type: int}
      ngram_max:    {choices: [1, 2]}
      cf_weight:    {low: 0.0, high: 0.8, type: float}

  lightfm:
    class: LightFMRecommender
    module: recommenders.lightfm_rec
    n_trials: 300
    n_jobs: 2
    urm_modes: [session, user]
    fixed_params:
      num_threads: 4
    search_space:
      no_components:  {low: 32,    high: 256,  log: true, type: int}
      loss:           {choices: [warp, bpr]}
      learning_rate:  {low: 1.0e-3, high: 0.5, log: true, type: float}
      item_alpha:     {low: 1.0e-8, high: 1.0e-3, log: true, type: float}
      user_alpha:     {low: 1.0e-8, high: 1.0e-3, log: true, type: float}
      epochs:         {low: 10,   high: 100,  step: 5,   type: int}

  heuristic:
    class: HeuristicRecommender
    module: heuristic.heuristic_v0
    n_trials: 400
    n_jobs: 5
    urm_modes: [session]
    fixed_params: {}
    search_space:
      album_last:   {low: 0.0,  high: 10.0,            type: float}
      artist_last:  {low: 0.0,  high: 10.0,            type: float}
      album_any:    {low: 0.0,  high: 10.0,            type: float}
      artist_any:   {low: 0.0,  high: 10.0,            type: float}
      year:         {low: 0.0,  high: 10.0,            type: float}
      pop_match:    {low: 0.0,  high: 10.0,            type: float}
      pop_z:        {low: 0.0,  high: 10.0,            type: float}
      cat_A:        {low: 0.2,  high: 10.0,            type: float}
      cat_B:        {low: 0.2,  high: 10.0,            type: float}
      cat_C:        {low: 0.2,  high: 10.0,            type: float}
      cat_D:        {low: 0.2,  high: 10.0,            type: float}
      cat_E:        {low: 0.2,  high: 10.0,            type: float}
      cat_F:        {low: 0.2,  high: 10.0,            type: float}
      cat_G:        {low: 0.2,  high: 10.0,            type: float}
      cat_H:        {low: 0.2,  high: 10.0,            type: float}
      cat_I:        {low: 0.2,  high: 10.0,            type: float}
      cat_J:        {low: 0.2,  high: 10.0,            type: float}
      cat_K:        {low: 0.2,  high: 10.0,            type: float}
      spec_HH:      {low: 0.2,  high: 10.0,            type: float}
      spec_LH:      {low: 0.2,  high: 10.0,            type: float}
      spec_HL:      {low: 0.2,  high: 10.0,            type: float}
      spec_LL:      {low: 0.2,  high: 10.0,            type: float}
      decade_top_n: {low: 50,   high: 1000, log: true, type: int}

  bm25_cg:
    class: BM25TextCG
    module: recommenders.text_cg
    inference_mode: text
    n_trials: 300
    n_jobs: 2
    urm_modes: [session]
    fixed_params: {}
    search_space:
      k1:           {low: 0.5,   high: 3.0,             type: float}
      b:            {low: 0.3,   high: 1.0,             type: float}
      max_features: {low: 10000, high: 100000, step: 10000, type: int}
      cf_weight:    {low: 0.0,   high: 0.8,             type: float}

  # -----------------------------------------------------------------------
  # split_hidim family (current best CGs, devset wins on all 6 metrics
  # for split_hidim alone; compounds win each metric separately).
  # All three target recall@200 as Optuna objective.
  #
  # Shared:
  #   - 3 dense modalities (qwen3 / cf-bpr / clap), ICM split into 7 sub-modalities
  #   - artist/album SVD 256, tag SVD 128 (inherited from SplitHiDim defaults)
  #   - n_heads fixed at 8 so head_dim = hidden_size/8 stays even for RoPE
  #     (works for hidden ∈ {128, 192, 256, 384, 512})
  # -----------------------------------------------------------------------

  split_hidim_xattn:
    class: FeatureBert4RecIdentityCosineRoPEMMHICMSplitHiDimXAttnRecommender
    module: recommenders.feature_bert4rec_identity_cosine_rope_mmh_icm_split_hidim_xattn
    n_trials: 50
    n_jobs: 1
    urm_modes: [session]
    fixed_params:
      feature_emb_paths:
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00000-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00001-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00002-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00003-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/test_tracks-00000-of-00001.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks_filled-00000-of-00001.parquet"
      feature_modalities:
        - "metadata-qwen3_embedding_0.6b"
        - "cf-bpr"
        - "audio-laion_clap"
      max_seq_len: 50
      n_heads: 8
      batch_size: 256
      epochs: 200
      warmup_ratio: 0.1
      val_ratio: 0.1
      early_stop_patience: 20
      max_future_years: 0.0
      icm_compressed_dim: 256   # ignored by split variants (uses per-block dims)
      device: "auto"
    search_space:
      hidden_size:      {choices: [128, 192, 256, 384, 512]}
      n_layers:         {low: 2,       high: 5,                  type: int}
      dropout:          {low: 0.05,    high: 0.30,               type: float}
      mask_prob:        {low: 0.15,    high: 0.55,               type: float}
      lr:               {low: 3.0e-4,  high: 5.0e-3, log: true,  type: float}
      weight_decay:     {low: 3.0e-4,  high: 3.0e-2, log: true,  type: float}
      init_tau:         {low: 0.05,    high: 0.25,   log: true,  type: float}
      lr_final_factor:  {low: 0.01,    high: 0.15,   log: true,  type: float}
      artist_dim:       {choices: [128, 192, 256, 384]}
      album_dim:        {choices: [128, 192, 256, 384]}
      tag_dim:          {choices: [64,  128, 192, 256]}

  split_hidim_xattn_hardneg:
    class: FeatureBert4RecIdentityCosineRoPEMMHICMSplitHiDimXAttnHardNegRecommender
    module: recommenders.feature_bert4rec_identity_cosine_rope_mmh_icm_split_hidim_xattn_hardneg
    n_trials: 50
    n_jobs: 1
    urm_modes: [session]
    fixed_params:
      feature_emb_paths:
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00000-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00001-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00002-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00003-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/test_tracks-00000-of-00001.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks_filled-00000-of-00001.parquet"
      feature_modalities:
        - "metadata-qwen3_embedding_0.6b"
        - "cf-bpr"
        - "audio-laion_clap"
      max_seq_len: 50
      n_heads: 8
      batch_size: 256
      epochs: 200
      warmup_ratio: 0.1
      val_ratio: 0.1
      early_stop_patience: 20
      max_future_years: 0.0
      icm_compressed_dim: 256
      device: "auto"
    search_space:
      hidden_size:      {choices: [128, 192, 256, 384, 512]}
      n_layers:         {low: 2,       high: 5,                  type: int}
      dropout:          {low: 0.05,    high: 0.30,               type: float}
      mask_prob:        {low: 0.15,    high: 0.55,               type: float}
      lr:               {low: 3.0e-4,  high: 5.0e-3, log: true,  type: float}
      weight_decay:     {low: 3.0e-4,  high: 3.0e-2, log: true,  type: float}
      init_tau:         {low: 0.05,    high: 0.25,   log: true,  type: float}
      lr_final_factor:  {low: 0.01,    high: 0.15,   log: true,  type: float}
      artist_dim:       {choices: [128, 192, 256, 384]}
      album_dim:        {choices: [128, 192, 256, 384]}
      tag_dim:          {choices: [64,  128, 192, 256]}
      hardneg_k:        {low: 16,      high: 128,    log: true,  type: int}
      hardneg_weight:   {low: 0.05,    high: 0.8,                type: float}
      hardneg_tau:      {low: 0.03,    high: 0.3,    log: true,  type: float}

  # -----------------------------------------------------------------------
  # split_hidim base (no xattn, no hardneg) — same base hyperparam space.
  # -----------------------------------------------------------------------
  split_hidim:
    class: FeatureBert4RecIdentityCosineRoPEMMHICMSplitHiDimRecommender
    module: recommenders.feature_bert4rec_identity_cosine_rope_mmh_icm_split_hidim
    n_trials: 50
    n_jobs: 1
    urm_modes: [session]
    fixed_params:
      feature_emb_paths:
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00000-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00001-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00002-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00003-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/test_tracks-00000-of-00001.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks_filled-00000-of-00001.parquet"
      feature_modalities:
        - "metadata-qwen3_embedding_0.6b"
        - "cf-bpr"
        - "audio-laion_clap"
      max_seq_len: 50
      n_heads: 8
      batch_size: 256
      epochs: 200
      warmup_ratio: 0.1
      val_ratio: 0.1
      early_stop_patience: 20
      max_future_years: 0.0
      icm_compressed_dim: 256
      device: "auto"
    search_space:
      hidden_size:      {choices: [128, 192, 256, 384, 512]}
      n_layers:         {low: 2,       high: 5,                  type: int}
      dropout:          {low: 0.05,    high: 0.30,               type: float}
      mask_prob:        {low: 0.15,    high: 0.55,               type: float}
      lr:               {low: 3.0e-4,  high: 5.0e-3, log: true,  type: float}
      weight_decay:     {low: 3.0e-4,  high: 3.0e-2, log: true,  type: float}
      init_tau:         {low: 0.05,    high: 0.25,   log: true,  type: float}
      lr_final_factor:  {low: 0.01,    high: 0.15,   log: true,  type: float}
      artist_dim:       {choices: [128, 192, 256, 384]}
      album_dim:        {choices: [128, 192, 256, 384]}
      tag_dim:          {choices: [64,  128, 192, 256]}

  # -----------------------------------------------------------------------
  # xattn FFN variants (glu / swiglu / mha). mha adds xattn_heads; swiglu
  # adds mod_drop_p.
  # -----------------------------------------------------------------------
  split_hidim_xattn_glu:
    class: FeatureBert4RecIdentityCosineRoPEMMHICMSplitHiDimXAttnGLURecommender
    module: recommenders.feature_bert4rec_identity_cosine_rope_mmh_icm_split_hidim_xattn_glu
    n_trials: 50
    n_jobs: 1
    urm_modes: [session]
    fixed_params:
      feature_emb_paths:
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00000-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00001-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00002-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00003-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/test_tracks-00000-of-00001.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks_filled-00000-of-00001.parquet"
      feature_modalities:
        - "metadata-qwen3_embedding_0.6b"
        - "cf-bpr"
        - "audio-laion_clap"
      max_seq_len: 50
      n_heads: 8
      batch_size: 256
      epochs: 200
      warmup_ratio: 0.1
      val_ratio: 0.1
      early_stop_patience: 20
      max_future_years: 0.0
      icm_compressed_dim: 256
      device: "auto"
    search_space:
      hidden_size:      {choices: [128, 192, 256, 384, 512]}
      n_layers:         {low: 2,       high: 5,                  type: int}
      dropout:          {low: 0.05,    high: 0.30,               type: float}
      mask_prob:        {low: 0.15,    high: 0.55,               type: float}
      lr:               {low: 3.0e-4,  high: 5.0e-3, log: true,  type: float}
      weight_decay:     {low: 3.0e-4,  high: 3.0e-2, log: true,  type: float}
      init_tau:         {low: 0.05,    high: 0.25,   log: true,  type: float}
      lr_final_factor:  {low: 0.01,    high: 0.15,   log: true,  type: float}
      artist_dim:       {choices: [128, 192, 256, 384]}
      album_dim:        {choices: [128, 192, 256, 384]}
      tag_dim:          {choices: [64,  128, 192, 256]}

  # Isolates modality dropout from the SwiGLU FFN bundled with it in _swiglu.
  # Same search space as split_hidim_xattn + mod_drop_p; GELU FFN preserved.
  split_hidim_xattn_moddrop:
    class: FeatureBert4RecIdentityCosineRoPEMMHICMSplitHiDimXAttnModDropRecommender
    module: recommenders.feature_bert4rec_identity_cosine_rope_mmh_icm_split_hidim_xattn_moddrop
    n_trials: 50
    n_jobs: 1
    urm_modes: [session]
    fixed_params:
      feature_emb_paths:
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00000-of-00004.parquet"
        - "data/talkpl-ai/TalkPlayData-Challenge-Track-Embeddings/data/all_tracks-00001-of-00004.parquet"
